<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatKND — Documentos</title>
  <link rel="stylesheet" href="/viewer.css" />
</head>
<body>

<header>
  <h1>ChatKND</h1>
  <nav>
    <a href="/" class="nav-link active">Documentos</a>
    <a href="/chat" class="nav-link">Chat</a>
  </nav>
  <div class="header-user">
    <span id="header-user-name"></span>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-label">Total Chunks</span><span class="stat-value" id="s-chunks">—</span></div>
  <div class="stat"><span class="stat-label">Total Arquivos</span><span class="stat-value" id="s-sources">—</span></div>
  <div class="stat collection" onclick="openModalCollection()"><span class="stat-label">Coleção de Dados</span><span class="stat-value" id="s-cols">—</span></div>
</div>

<div class="modal-backdrop" onclick="closeCollectionActions(event)">
  <div class="modal-collection">
    <div class="collection-title"> <h1> Coleções </h1></div>
    <div id="collections-list"></div>
  </div>
</div>

<div class="workspace">
  <aside>
    <div class="upload-section">
      <span class="upload-title">Processar Documento</span>
      <div class="upload-row">
        <label class="file-pick-label">
          <input type="file" id="file-input" accept=".pdf,.docx,.txt,.md" multiple onchange="onFilePick(this)" />
          <span class="file-pick-name" id="file-name">Escolher Arquivo(s)…</span>
        </label>
        <button class="ingest-btn" id="ingest-btn" onclick="ingestFile()">Processar</button>
      </div>
      <div class="ingest-status" id="ingest-status"></div>
    </div>
    <div class="aside-head">Arquivos</div>
    <div class="source-filter">
      <input type="text" id="source-filter-input" placeholder="Filtrar Arquivos…" oninput="filterSources()" />
    </div>
    <div class="source-list" id="source-list">
      <div class="empty">Carregando…</div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Busque por palavra ou frase…" />
      <button onclick="doSearch()" title="Executa uma pesquisa pelo termo exato.">Busca por Texto</button>
      <button class="semantic" id="semantic-btn" onclick="doSemanticSearch()" title="Executa uma busca por proximidade de texto, exatamente como o Chat executa para encontrar dados parecidos.">Busca Semântica</button>
      <button class="secondary" onclick="clearSearch()">Todos</button>
    </div>
    <div class="mode-label" id="mode-label">Mostrando todos os chunks</div>
    <div class="chunk-list" id="chunk-list">
      <div class="empty">Selecione um arquivo ou faça uma busca</div>
    </div>
    <div class="pagination" id="pagination" style="display:none"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/viewer.js"></script>
</body>
</html>
