<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatKND — Nova senha</title>
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-mark">KND</div>
    <span class="auth-logo-text">ChatKND</span>
  </div>
  <h1>Definir nova senha</h1>
  <p class="auth-sub">Escolha uma nova senha para sua conta.</p>

  <div id="msg" class="msg" style="display:none"></div>

  <form id="form">
    <div class="field">
      <label for="password">Nova senha <span style="color:#94a3b8;font-weight:400">(mín. 3 caracteres)</span></label>
      <input type="password" id="password" name="password" autocomplete="new-password" required minlength="3" />
    </div>
    <div class="field">
      <label for="confirm">Confirmar nova senha</label>
      <input type="password" id="confirm" name="confirm" autocomplete="new-password" required />
    </div>
    <button type="submit" class="btn-primary" id="btn">Salvar senha</button>
  </form>

  <p class="auth-footer"><a href="/login">Voltar ao login</a></p>
</div>

<script>
const form  = document.getElementById("form");
const msgEl = document.getElementById("msg");
const btn   = document.getElementById("btn");

function showMsg(text, type) {
  msgEl.textContent = text;
  msgEl.className = `msg ${type}`;
  msgEl.style.display = "";
}

const token = new URLSearchParams(window.location.search).get("token");
if (!token) {
  showMsg("Link inválido ou expirado.", "error");
  form.style.display = "none";
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  msgEl.style.display = "none";
  if (form.password.value !== form.confirm.value) {
    showMsg("As senhas não coincidem.", "error");
    return;
  }
  btn.disabled = true;
  btn.textContent = "Salvando…";
  try {
    const res  = await fetch("/api/auth/set-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, password: form.password.value }),
    });
    const data = await res.json();
    if (data.ok) {
      showMsg("Senha redefinida com sucesso! Redirecionando…", "success");
      form.style.display = "none";
      setTimeout(() => window.location.href = "/login", 2000);
    } else {
      showMsg(data.error || "Link inválido ou expirado.", "error");
    }
  } catch {
    showMsg("Erro de conexão. Tente novamente.", "error");
  }
  btn.disabled = false;
  btn.textContent = "Salvar senha";
});
</script>
</body>
</html>
