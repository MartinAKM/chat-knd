<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatKND — Chat</title>
  <link rel="stylesheet" href="/chat.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css" />
</head>
<body>

<header>
  <h1>ChatKND</h1>
  <nav>
    <a href="/" class="nav-link" id="nav-viewer" style="display:none">Document Viewer</a>
    <a href="/chat" class="nav-link active">Chat</a>
  </nav>
  <div class="header-user">
    <span id="header-user-name"></span>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>
</header>

<div class="app-layout">

  <aside class="history-sidebar">
    <button class="sidebar-new-btn" onclick="newConversation()">+ New Chat</button>
    <div class="history-list" id="history-list"></div>
  </aside>

  <div class="chat-layout">
    <div class="thread" id="thread">
      <div class="welcome" id="welcome">
        <div class="welcome-logo">KND</div>
        <p class="welcome-title">ERP Support Assistant</p>
        <p class="welcome-sub">Ask anything about support tickets or ERP documentation.</p>
      </div>
    </div>

    <div class="composer-wrap">
      <div id="img-preview" class="img-preview"></div>
      <div class="composer">
        <button type="button" id="attach-btn" title="Attach image" onclick="document.getElementById('img-input').click()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <textarea
          id="msg-input"
          placeholder="Ask a question…"
          rows="1"
          oninput="autoResize(this)"
          onkeydown="onKey(event)"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
      <p class="composer-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
      <input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="handleImageAttach()">
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
<script src="/chat.js"></script>
</body>
</html>
