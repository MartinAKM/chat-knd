<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatKND — Recuperar senha</title>
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-mark">KND</div>
    <span class="auth-logo-text">ChatKND</span>
  </div>
  <h1>Recuperar senha</h1>
  <p class="auth-sub">Informe seu email e enviaremos um link para redefinir sua senha.</p>

  <div id="msg" class="msg" style="display:none"></div>

  <form id="form">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required />
    </div>
    <button type="submit" class="btn-primary" id="btn">Enviar link</button>
  </form>

  <p class="auth-footer"><a href="/login">Voltar ao login</a></p>
</div>

<script>
const form  = document.getElementById("form");
const msgEl = document.getElementById("msg");
const btn   = document.getElementById("btn");

function showMsg(text, type) {
  msgEl.textContent = text;
  msgEl.className = `msg ${type}`;
  msgEl.style.display = "";
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  msgEl.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Enviando…";
  try {
    const res  = await fetch("/api/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: form.email.value.trim().toLowerCase() }),
    });
    const data = await res.json();
    if (data.ok) {
      showMsg("Se este email estiver cadastrado, você receberá um link em breve.", "success");
      form.style.display = "none";
    } else {
      showMsg(data.error || "Erro. Tente novamente.", "error");
    }
  } catch {
    showMsg("Erro de conexão. Tente novamente.", "error");
  }
  btn.disabled = false;
  btn.textContent = "Enviar link";
});
</script>
</body>
</html>
